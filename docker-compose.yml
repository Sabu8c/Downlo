# ─────────────────────────────────────────────────────────────────────────────
# Downlo — Docker Compose (Portainer / Production)
# Pulls the pre-built image from GitHub Container Registry.
# ─────────────────────────────────────────────────────────────────────────────

services:
  downlo:
    # !! This matches your GitHub username/repository name (lowercase) !!
    image: ghcr.io/sabu8c/downlo:latest
    container_name: downlo
    restart: unless-stopped

    # ── Ports ──────────────────────────────────────────────────────────────────
    ports:
      - "8000:8000" # FastAPI / Uvicorn

    # ── Volumes ────────────────────────────────────────────────────────────────
    volumes:
      # All downloaded media persists on the host even after container restarts.
      # Portainer will create this named volume automatically.
      - downlo_downloads:/app/downloads

    # ── Environment Variables ──────────────────────────────────────────────────
    # Spotify integration requires a free Developer App at:
    #   https://developer.spotify.com/dashboard
    # Set these in Portainer's "Env" tab when creating the stack,
    # or in a .env file on the Portainer host.
    environment:
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID:-}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET:-}
      - DOWNLOAD_DIR=/app/downloads
    # ── Resource limits (optional, adjust to taste) ────────────────────────────
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "2"
    #       memory: 2G

    # ── Named Volumes ──────────────────────────────────────────────────────────────
volumes:
  downlo_downloads:
